<!-- @dsCard group="Foundations" name="Spacing & Shape" subtitle="4px rhythm, radius scale" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../../../styles.css" />
  <style>
    body { margin: 0; padding: 24px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
    h3 { margin: 0 0 16px; font-size: 20px; font-weight: 600; letter-spacing: -0.03em; }
    .bars { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
    .bar { display: flex; align-items: center; gap: 12px; }
    .bar .fill { height: 16px; background: var(--accent); border-radius: 4px; }
    .bar .lbl { font-size: 13px; color: var(--muted); font-family: var(--font-geist-mono); min-width: 96px; }
    .shapes { display: flex; gap: 16px; flex-wrap: wrap; }
    .shape { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .box { width: 72px; height: 72px; background: var(--surface); box-shadow: var(--surface-shadow); display: grid; place-items: center; color: var(--muted); font-size: 12px; }
    .cap { font-size: 13px; color: var(--muted); font-family: var(--font-geist-mono); }
  </style>
</head>
<body>
  <h3>Spacing — 4px baseline, even scale</h3>
  <div class="bars">
    <div class="bar"><span class="lbl">gap-2 · 8px</span><span class="fill" style="width: 8px"></span></div>
    <div class="bar"><span class="lbl">gap-4 · 16px</span><span class="fill" style="width: 16px"></span></div>
    <div class="bar"><span class="lbl">gap-6 · 24px</span><span class="fill" style="width: 24px"></span></div>
    <div class="bar"><span class="lbl">gap-8 · 32px</span><span class="fill" style="width: 32px"></span></div>
    <div class="bar"><span class="lbl">gap-12 · 48px</span><span class="fill" style="width: 48px"></span></div>
  </div>
  <h3>Radius</h3>
  <div class="shapes">
    <div class="shape"><div class="box" style="border-radius: 4px">sm</div><span class="cap">4px</span></div>
    <div class="shape"><div class="box" style="border-radius: var(--radius)">md</div><span class="cap">8px · --radius</span></div>
    <div class="shape"><div class="box" style="border-radius: var(--field-radius)">lg</div><span class="cap">12px · --field-radius</span></div>
    <div class="shape"><div class="box" style="border-radius: 9999px">full</div><span class="cap">9999px</span></div>
  </div>
</body>
</html>
